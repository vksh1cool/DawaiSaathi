<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0F766E" />
    <title>DawaiSaathi is offline</title>
    <style>
      :root { color-scheme: light; font-family: system-ui, sans-serif; }
      body { align-items: center; background: #fafaf7; color: #17342f; display: flex; margin: 0; min-height: 100vh; padding: 24px; }
      main { margin: auto; max-width: 32rem; }
      h1 { font-size: clamp(1.75rem, 6vw, 2.5rem); line-height: 1.1; margin: 0 0 1rem; }
      p { font-size: 1.1rem; line-height: 1.6; margin: 0 0 1.25rem; }
      button { background: #0f766e; border: 0; border-radius: 12px; color: #fff; cursor: pointer; font: inherit; font-weight: 700; min-height: 48px; padding: 0 18px; }
    </style>
  </head>
  <body>
    <main>
      <h1 lang="en">You’re offline</h1>
      <h1 lang="hi" style="margin-top:0.5rem; font-size: clamp(1.5rem, 5vw, 2rem);">आप ऑफ़लाइन हैं</h1>
      <p lang="en">Reconnect to view your medicine plan. DawaiSaathi does not keep private medicine information in its offline cache.</p>
      <p lang="hi">अपनी दवा योजना देखने के लिए फिर से कनेक्ट करें। दवाईसाथी ऑफ़लाइन कैश में निजी दवा की जानकारी नहीं रखता है।</p>
      <button type="button" onclick="location.reload()">Try again / पुनः प्रयास करें</button>
    </main>
  </body>
</html>
